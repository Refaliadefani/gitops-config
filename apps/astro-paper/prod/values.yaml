# Astro Paper - PROD environment
# Image tag di-update otomatis oleh Jenkins pipeline (after approval)

replicaCount: 2

image:
  repository: harbor.20.44.216.40.nip.io/devsecops/astro-paper
  tag: "latest"
  pullPolicy: Always

containerPort: 80

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  className: nginx
  hosts:
    - host: app-prod.20.44.216.40.nip.io
      paths:
        - path: /
          pathType: Prefix

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

livenessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 10

readinessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 5

env: []
